name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: Rust and Python checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.81
          components: rustfmt, clippy

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --workspace

      - name: Check no-default-features
        run: cargo check -p abir --no-default-features

      - name: Check full semantic core on no_std RISC-V
        run: |
          rustup target add riscv32imac-unknown-none-elf
          cargo check -p abir --no-default-features --features alloc --target riscv32imac-unknown-none-elf
          cargo check -p abir-bcs --no-default-features --features alloc --target riscv32imac-unknown-none-elf

      - name: Check fuzz target compiles
        run: cargo check --manifest-path fuzz/Cargo.toml --bin dataset_draft

      - name: Exercise performance harness
        run: ABIR_BENCH_ITERS=10000 cargo run -p abir-conformance --release --bin measure_semantic_core

      - name: Install Python validation tools
        run: python -m pip install --upgrade pip maturin pytest numpy jsonschema

      - name: Verify Adapter contract manifest and schemas
        run: python tools/verify_adapter_contract.py

      - name: Build and install Python extension
        run: |
          maturin build -m crates/abir-python/Cargo.toml --release --out dist
          python -m pip install dist/*.whl

      - name: Python parity and schema tests
        run: python -m pytest python/tests -q

  fuzz-smoke:
    name: Seed corpus smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Execute committed dataset corpus
        run: cargo fuzz run dataset_draft fuzz/corpus/dataset_draft -- -runs=1000
